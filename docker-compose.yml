services:
  api:
    build: ./api
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://admin:secretpassword@db:27017?authSource=admin
      - DB_NAME=mydb
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_started

  db:
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secretpassword
      - MONGO_INITDB_DATABASE=mydb
    volumes:
      - mongo-data:/data/db
      - ./mongo-init/seed.js:/docker-entrypoint-initdb.d/seed.js:ro

  client:
    build:
      context: ./client
      target: build
    ports:
      - "4200:4200"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - API_URL=http://localhost:3000
    command: npx -y @angular/cli serve --host 0.0.0.0 --poll 2000
    depends_on:
      - api

  db-exporter:
    image: bitnami/mongodb-exporter:latest
    command:
      - --mongodb.uri=mongodb://admin:secretpassword@db:27017/?authSource=admin
      - --compatible-mode
      - --collect-all
    depends_on:
      - db

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      - db-exporter

  grafana:
    build: ./grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  mongo-data:
