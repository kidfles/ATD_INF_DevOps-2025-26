services:
  api:
    build: ./api
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://admin:secretpassword@db:27017?authSource=admin
      - DB_NAME=mydb
      - RABBITMQ_URL=amqp://rabbitmq:5672
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  db:
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secretpassword
      - MONGO_INITDB_DATABASE=mydb
    volumes:
      - mongo-data:/data/db
      - ./mongo-init/seed.js:/docker-entrypoint-initdb.d/seed.js:ro

  client:
    build:
      context: ./client
      target: build
    ports:
      - "4200:4200"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - API_URL=http://localhost:3000
    command: npx -y @angular/cli serve --host 0.0.0.0 --poll 2000
    depends_on:
      - api

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  audit-db:
    image: mongo:latest
    restart: always
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secretpassword
      - MONGO_INITDB_DATABASE=auditdb
    volumes:
      - audit-mongo-data:/data/db

  audit-service:
    build: ./audit-service
    command: npm run dev
    ports:
      - "3002:3002"
    environment:
      - MONGO_URL=mongodb://admin:secretpassword@audit-db:27017?authSource=admin
      - DB_NAME=auditdb
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - PORT=3002
    volumes:
      - ./audit-service:/app
      - /app/node_modules
    depends_on:
      audit-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  db-exporter:
    image: bitnami/mongodb-exporter:latest
    command:
      - --mongodb.uri=mongodb://admin:secretpassword@db:27017/?authSource=admin
      - --compatible-mode
      - --collect-all
    depends_on:
      - db

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    depends_on:
      - api
      - db-exporter

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      - prometheus

  grafana:
    build: ./grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  mongo-data:
  audit-mongo-data:
