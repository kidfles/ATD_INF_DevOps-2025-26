services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://admin:secretpassword@db:27017?authSource=admin
      - DB_NAME=mydb
    depends_on:
      - db

  db:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secretpassword
    volumes:
      - mongo-data:/data/db

  client:
    build: ./client
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api

volumes:
  mongo-data:
