kind: Environment
name: ATD-INF-DevOps
type: primary
components:
    -
        kind: Database
        name: db
        dockerCompose:
            image: mongo:latest
            restart: always
            environment:
                MONGO_INITDB_ROOT_USERNAME: admin
                MONGO_INITDB_ROOT_PASSWORD: secretpassword
                MONGO_INITDB_DATABASE: mydb
            volumes:
                - mongo-data:/data/db
    -
        kind: Application
        name: api
        gitRepo: 'https://github.com/kidfles/ATD_INF_DevOps-2025-26.git'
        gitBranch: development
        gitApplicationPath: api
        dockerCompose:
            build:
                context: ./api
                dockerfile: Dockerfile
            ports:
                - '80:80'
            environment:
                MONGO_URL: 'mongodb://admin:secretpassword@db:27017?authSource=admin'
                DB_NAME: mydb
            deploy:
                resources:
                    limits:
                        cpus: '0.35'
                        memory: '512MiB'
        hosts:
            -
                hostname: 'api-{{ env.base_domain }}'
                path: /
                servicePort: 80
    -
        kind: Application
        name: rabbitmq
        dockerCompose:
            image: 'rabbitmq:3-management'
            environment:
                RABBITMQ_DEFAULT_USER: guest
                RABBITMQ_DEFAULT_PASS: guest
            ports:
                - '5672:5672'
                - '15672:15672'
            deploy:
                resources:
                    limits:
                        cpus: '0.25'
                        memory: '512MiB'
        hosts:
            -
                hostname: 'rabbitmq-{{ env.base_domain }}'
                path: /
                servicePort: 15672
    -
        kind: Application
        name: client
        gitRepo: 'https://github.com/kidfles/ATD_INF_DevOps-2025-26.git'
        gitBranch: development
        gitApplicationPath: client
        dockerCompose:
            build:
                context: ./client
                dockerfile: Dockerfile
            ports:
                - '80:80'
            deploy:
                resources:
                    limits:
                        cpus: '0.35'
                        memory: '512MiB'
        hosts:
            -
                hostname: 'client-{{ env.base_domain }}'
                path: /
                servicePort: 80
volumes:
    mongo-data: {}
