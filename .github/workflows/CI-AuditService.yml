name: CI-AuditService

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./audit-service
    permissions:
      checks: write
      pull-requests: write
      contents: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests with coverage
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: ./audit-service
